# Enable split keyboard with 4 peripherals
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=4

# Enable soft off for power management (sleep disabled to avoid BLE reconnect issues)
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_PM_SOFT_OFF=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Boost bluetooth power for better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Keyboard name
CONFIG_ZMK_KEYBOARD_NAME="Ade Cornes"

# Enable RGB underglow (for controlling LEDs on peripheral halves)
CONFIG_ZMK_RGB_UNDERGLOW=n

# Enable multiple Bluetooth profiles (4 peripherals (2 crkbds) + 5 host devices = 7 total)
CONFIG_BT_MAX_CONN=9
CONFIG_BT_MAX_PAIRED=9

# Enable both USB and BLE support
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y 
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512
CONFIG_ZMK_STUDIO=n
