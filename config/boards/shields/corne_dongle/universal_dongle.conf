# 6 peripherals: Corne L+R, Sweep L+R, Totem L+R
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=6

# Power management
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_PM_SOFT_OFF=y

# Boost BT power for better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Keyboard name
CONFIG_ZMK_KEYBOARD_NAME="Ade Universal"

# 6 peripherals + 5 host devices = 11 connections
CONFIG_BT_MAX_CONN=11
CONFIG_BT_MAX_PAIRED=11

# USB + BLE
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

# Studio requires zmk,physical-layout which the dongle lacks — disable
CONFIG_ZMK_STUDIO=n
