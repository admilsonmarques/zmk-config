include:
  # Corne
  - board: nice_nano
    shield: corne_left
  - board: nice_nano
    shield: corne_right

  # Totem
  - board: xiao_ble
    shield: totem_left
  - board: xiao_ble
    shield: totem_right
  - board: xiao_ble
    shield: totem_dongle

  # Corne Dongle Peripherals
  - board: nice_nano
    shield: corne_dongle_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: nice_nano
    shield: corne_dongle_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  # Sweep Pro (Standard Split)
  - board: nice_nano
    shield: sweep_left
  - board: nice_nano
    shield: sweep_right

  # Sweep Pro (Dongle Peripherals)
  - board: nice_nano
    shield: sweep_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: nice_nano
    shield: sweep_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  # Dongle Central
  - board: xiao_ble
    shield: corne_dongle_dongle

  # Reset & Maintenance
  - board: xiao_ble
    shield: settings_reset
  - board: nice_nano
    shield: settings_reset
