include:
  # Corne
  - board: nice_nano/nrf52840/zmk
    shield: corne_left
  - board: nice_nano/nrf52840/zmk
    shield: corne_right

  # Totem
  - board: xiao_ble/nrf52840/zmk
    shield: totem_left
  - board: xiao_ble/nrf52840/zmk
    shield: totem_right
  - board: xiao_ble/nrf52840/zmk
    shield: totem_dongle

  # Corne Dongle Peripherals
  - board: nice_nano/nrf52840/zmk
    shield: corne_dongle_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: nice_nano/nrf52840/zmk
    shield: corne_dongle_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  # Sweep Pro (Standard Split — sweep_left as central, sweep_right as peripheral)
  - board: nice_nano/nrf52840/zmk
    shield: sweep_left
  - board: nice_nano/nrf52840/zmk
    shield: sweep_right

  # Sweep Pro (Dongle Peripherals — both halves connect to corne_dongle_dongle)
  - board: nice_nano/nrf52840/zmk
    shield: sweep_dongle_left
  # sweep_right reused as-is: sweep_right.conf sets ROLE_CENTRAL=n by default

  # Universal Dongle Central (works with Corne and Sweep)
  - board: xiao_ble/nrf52840/zmk
    shield: corne_dongle_dongle

  # Reset & Maintenance
  - board: xiao_ble/nrf52840/zmk
    shield: settings_reset
  - board: nice_nano/nrf52840/zmk
    shield: settings_reset
